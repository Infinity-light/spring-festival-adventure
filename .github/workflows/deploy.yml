name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy source to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/opt/spring-festival-adventure/spring-festival-adventure/source"
          rm: true

      - name: Build and deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            cd /opt/spring-festival-adventure/spring-festival-adventure

            # Copy source files to build context
            cp -r source/. build-context/
            rm -rf source

            cd build-context

            # Build image locally on server
            docker build -t spring-festival-adventure:latest .

            # Go back and update compose
            cd /opt/spring-festival-adventure/spring-festival-adventure
            cp build-context/docker-compose.yml . 2>/dev/null || true

            # Stop old container, start new
            docker compose down
            docker compose up -d --remove-orphans

            # Cleanup
            rm -rf build-context
            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Waiting for container to start..."
            sleep 10
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3002/ || true)
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
                echo "Health check passed (HTTP $STATUS)"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 5 attempts"
            docker logs spring-festival-adventure --tail 20
            exit 1
